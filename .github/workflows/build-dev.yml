name: Build Dev

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Build APK
        run: |
          cd android-project
          curl -sL https://github.com/gradle/gradle/archive/refs/tags/v8.5.tar.gz | tar xz
          ./gradle-8.5/bin/gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeMobile-Dev
          path: android-project/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
