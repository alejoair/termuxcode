[project]
name = "termuxcode"
dynamic = ["version"]
description = "Python project for Termux development"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "claude-agent-sdk==0.1.48",
    "textual==8.0.0",
]

[project.scripts]
termuxcode = "termuxcode.cli:main"

[build-system]
requires = ["setuptools>=61.0", "wheel", "setuptools_scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
version_scheme = "release-branch-semver"
fallback_version = "0.0.0"
git_describe_command = ["git", "describe", "--tags", "--dirty", "--abbrev=8"]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "mypy>=1.0.0",
    "textual-dev==1.8.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"*" = ["*.html", "*.css", "*.js"]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
