<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>TERMUXCODE</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: '#0a0f14',
                        raised: '#131a22',
                        surface: '#1a2332',
                        border: '#243040',
                        'border-focus': '#0d9488',
                        txt: '#e2e8f0',
                        muted: '#64748b',
                        accent: '#14b8a6',
                        ok: '#22d3ee',
                        err: '#f43f5e',
                        warn: '#f59e0b',
                    }
                }
            }
        }
    </script>

    <!-- CodeMirror 6 importmap -->
    <script type="importmap">
    {
        "imports": {
            "codemirror": "https://esm.sh/codemirror@6.0.2",
            "@codemirror/state": "https://esm.sh/@codemirror/state@6",
            "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6",
            "@codemirror/lang-python": "https://esm.sh/@codemirror/lang-python@6",
            "@codemirror/lang-html": "https://esm.sh/@codemirror/lang-html@6",
            "@codemirror/lang-css": "https://esm.sh/@codemirror/lang-css@6",
            "@codemirror/lang-json": "https://esm.sh/@codemirror/lang-json@6",
            "@codemirror/lang-markdown": "https://esm.sh/@codemirror/lang-markdown@6",
            "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6",
            "@codemirror/lint": "https://esm.sh/@codemirror/lint@6",
            "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6",
            "@codemirror/view": "https://esm.sh/@codemirror/view@6",
            "@xterm/xterm": "https://esm.sh/@xterm/xterm@5",
            "@xterm/addon-fit": "https://esm.sh/@xterm/addon-fit@0.10",
            "@xterm/addon-web-links": "https://esm.sh/@xterm/addon-web-links@0.11"
        }
    }
    </script>

    <!-- xterm.js CSS -->
    <link rel="stylesheet" href="https://esm.sh/@xterm/xterm@5/css/xterm.css">

    <!-- Markdown parser (version pinned) -->
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>

    <!-- HTML sanitizer -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

    <style>
        :root {
            --color-bg-base: #0a0f14;
            --color-bg-raised: #131a22;
            --color-bg-surface: #1a2332;
            --color-border: #243040;
            --color-border-focus: #0d9488;
            --color-text: #e2e8f0;
            --color-text-muted: #64748b;
            --color-accent: #14b8a6;
            --color-ok: #22d3ee;
            --color-err: #f43f5e;
        }

        /* Message Styles */
        .message {
            animation: fadeIn 0.3s ease-in;
            margin-bottom: 1rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.no-anim {
            animation: none;
        }

        .message-label {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            margin-bottom: 0.25rem;
        }

        .bubble {
            background-color: var(--color-bg-raised);
            border-radius: 0.5rem;
            padding: 0.75rem;
        }

        .message.user .bubble {
            background-color: var(--color-bg-surface);
            border-right: 3px solid var(--color-border-focus);
        }

        .message.assistant .bubble {
            background-color: var(--color-bg-raised);
            border-left: 3px solid var(--color-accent);
        }

        .query-stats-badge {
            position: absolute;
            top: 0.4rem;
            right: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.625rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: var(--color-text);
            opacity: 0.45;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .message.assistant:hover .query-stats-badge {
            opacity: 0.85;
        }

        .message.system .bubble {
            background-color: var(--color-bg-raised);
            border-left: 3px solid var(--color-text-muted);
            color: var(--color-text-muted);
        }

        .message.tool-call,
        .message.thinking-msg {
            margin-top: 0.5rem;
        }

        .message.tool-call .bubble,
        .message.thinking-msg .bubble {
            background-color: transparent;
            padding: 0;
        }

        .markdown-content {
            line-height: 1.6;
        }

        .markdown-content p {
            margin-bottom: 0.5rem;
        }

        .markdown-content pre {
            background-color: var(--color-bg-base);
            border-radius: 0.25rem;
            padding: 0.75rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }

        .markdown-content code {
            background-color: var(--color-bg-surface);
            padding: 0.125rem 0.25rem;
            border-radius: 0.125rem;
            font-size: 0.875em;
        }

        .text-content {
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Tool blocks */
        .tool-group {
            margin-bottom: 0.25rem;
        }

        .tool-block,
        .tool-result-block,
        .thinking-block {
            background-color: var(--color-bg-raised);
            border: 1px solid var(--color-border);
            border-radius: 0.25rem;
            overflow: hidden;
        }

        .tool-group .tool-result-block {
            margin-top: 0.25rem;
            border-left: 2px solid var(--color-border);
        }

        .tool-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.15s;
        }

        .tool-header:hover {
            background-color: var(--color-bg-surface);
        }

        .tool-chevron {
            transition: transform 0.15s;
        }

        .accordion-item.open .tool-chevron {
            transform: rotate(90deg);
        }

        .tool-name {
            font-weight: 500;
        }

        .thinking-label {
            color: var(--color-accent);
        }

        .tool-result-label {
            color: var(--color-text-muted);
        }

        .accordion-item-content {
            display: none;
            padding: 0 0.75rem 0.75rem;
        }

        .accordion-item.open .accordion-item-content {
            display: block;
        }

        .tool-content,
        .thinking-content {
            background-color: var(--color-bg-base);
            padding: 0.75rem;
            border-radius: 0.25rem;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
        }

        /* Typing Indicator Animation */
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        .typing-dot {
            animation: bounce 1s infinite;
        }

        /* Diff View */
        .diff-view {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            border-radius: 0.25rem;
            overflow-x: auto;
        }

        .diff-line {
            display: flex;
            align-items: stretch;
            min-height: 1.5em;
        }

        .diff-line-num {
            width: 3rem;
            padding: 0 0.5rem;
            text-align: right;
            color: var(--color-text-muted);
            user-select: none;
            flex-shrink: 0;
            opacity: 0.6;
        }

        .diff-line-sign {
            width: 1.5rem;
            text-align: center;
            user-select: none;
            flex-shrink: 0;
            font-weight: bold;
        }

        .diff-line-content {
            flex: 1;
            padding: 0 0.5rem;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .diff-line.remove {
            background-color: rgba(244, 63, 94, 0.15);
        }
        .diff-line.remove .diff-line-sign {
            color: var(--color-err);
        }

        .diff-line.add {
            background-color: rgba(34, 211, 238, 0.1);
        }
        .diff-line.add .diff-line-sign {
            color: var(--color-ok);
        }

        .diff-line.context .diff-line-sign {
            color: var(--color-text-muted);
            opacity: 0.5;
        }

        /* CodeMirror editor in sidebar */
        .editor-sidebar .cm-editor {
            height: 100%;
            font-size: 13px;
        }
        .editor-sidebar .cm-scroller {
            overflow: auto;
        }
        .editor-sidebar .cm-content {
            padding-bottom: 50vh;
        }

        /* Editor tabs */
        .editor-tab {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            font-size: 11px;
            font-family: monospace;
            color: #64748b;
            background: transparent;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            white-space: nowrap;
            transition: color 0.15s, border-color 0.15s, background-color 0.15s;
        }
        .editor-tab:hover {
            color: #e2e8f0;
            background: #1a2332;
        }
        .editor-tab.active {
            color: #e2e8f0;
            border-bottom-color: #14b8a6;
            background: #0a0f14;
        }
        .editor-tab .close-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 3px;
            font-size: 10px;
            color: #64748b;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s, background-color 0.15s;
        }
        .editor-tab:hover .close-btn {
            opacity: 1;
        }
        .editor-tab .close-btn:hover {
            color: #f43f5e;
            background: rgba(244, 63, 94, 0.1);
        }

        /* Diff inline in editor */
        .editor-sidebar .cm-line.cm-diff-add {
            background: rgba(34, 211, 238, 0.12) !important;
            border-left: 3px solid rgba(34, 211, 238, 0.5);
        }
        .editor-sidebar .cm-diff-remove-widget {
            background: rgba(244, 63, 94, 0.15);
            border-left: 3px solid rgba(244, 63, 94, 0.6);
            color: rgba(244, 63, 94, 0.8);
            text-decoration: line-through;
            padding: 0 4px 0 8px;
            display: block;
            font-family: monospace;
            font-size: 13px;
            white-space: pre;
            line-height: 1.5;
        }

        /* Sidebar transition (left) */
        .sidebar-enter-active,
        .sidebar-leave-active {
            transition: margin-left 0.25s ease, opacity 0.2s ease;
        }
        .sidebar-enter-from,
        .sidebar-leave-to {
            margin-left: -24rem;
            opacity: 0;
        }

        /* Sidebar transition (right) */
        .sidebar-right-enter-active,
        .sidebar-right-leave-active {
            transition: margin-right 0.25s ease, opacity 0.2s ease;
        }
        .sidebar-right-enter-from,
        .sidebar-right-leave-to {
            margin-right: -20rem;
            opacity: 0;
        }

        /* ===== Mobile Drawers ===== */
        .drawer-overlay {
            position: fixed;
            inset: 0;
            z-index: 40;
            background: rgba(0, 0, 0, 0.5);
            animation: fadeInOverlay 0.2s ease;
        }
        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .drawer-left,
        .drawer-right {
            position: fixed;
            top: 0;
            bottom: 0;
            z-index: 50;
            width: 100vw;
            transition: transform 0.25s ease;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
            /* Dejar espacio para la barra de navegación de Android */
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        .drawer-left {
            left: 0;
            transform: translateX(-100%);
        }
        .drawer-right {
            right: 0;
            transform: translateX(100%);
        }
        .drawer-left.drawer-open,
        .drawer-right.drawer-open {
            transform: translateX(0);
        }

        /* Resize handle for sidebars */
        .resize-handle {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 6px;
            cursor: col-resize;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: width 0.2s;
        }
        /* Icono grip (6 puntitos) centrado verticalmente */
        .resize-handle::after {
            content: '\2807\2807';
            font-size: 7px;
            letter-spacing: 1px;
            line-height: 1;
            color: rgba(100, 116, 139, 0.4);
            writing-mode: vertical-lr;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            transition: color 0.2s, background-color 0.2s;
            padding: 6px 1px;
            border-radius: 3px;
        }
        .resize-handle:hover {
            width: 10px;
        }
        .resize-handle:hover::after {
            color: rgba(56, 189, 248, 0.8);
            background-color: rgba(56, 189, 248, 0.1);
        }
        .resize-handle.active {
            width: 10px;
        }
        .resize-handle.active::after {
            color: rgba(56, 189, 248, 1);
            background-color: rgba(56, 189, 248, 0.15);
        }
        body.is-resizing {
            cursor: col-resize !important;
            user-select: none !important;
        }
        body.is-resizing * {
            cursor: col-resize !important;
        }

        /* Safe areas for notch / home indicator */
        .safe-areas {
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
        }

        /* Mobile tabs horizontal scroll */
        .mobile-tabs-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .mobile-tabs-scroll::-webkit-scrollbar {
            display: none;
        }

        /* Mobile bottom bar (drawer toggles + actions) */
        .mobile-bottom-bar {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 3px 6px;
            background: #0a0f14;
            border-top: 1px solid #243040;
            flex-shrink: 0;
        }
        .mobile-bottom-sep {
            width: 1px;
            height: 16px;
            background: #243040;
            margin: 0 4px;
            flex-shrink: 0;
        }
        .mobile-action-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            border-radius: 6px;
            flex-shrink: 0;
            transition: color 0.15s, background-color 0.15s;
        }
        .mobile-action-icon:hover,
        .mobile-action-icon.active {
            color: #e2e8f0;
            background: #1a2332;
        }
        .mobile-action-icon.disabled {
            color: #243040;
            cursor: not-allowed;
        }

        /* Mobile action toolbar (inline inside bottom bar) */
        .mobile-action-bar {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .mobile-action-select {
            background: #131a22;
            border: 1px solid #243040;
            border-radius: 4px;
            color: #e2e8f0;
            font-size: 10px;
            padding: 2px 3px;
            outline: none;
            flex-shrink: 0;
        }
        .mobile-action-select:focus {
            border-color: #0d9488;
        }

        /* Terminal sidebar xterm overrides */
        .terminal-sidebar .xterm {
            height: 100%;
            padding: 2px;
        }
        .terminal-sidebar .xterm-viewport {
            overflow-y: auto !important;
        }
        .terminal-sidebar .xterm-screen {
            height: 100% !important;
        }

        /* Terminal mobile special keys bar */
        .term-keys-bar {
            flex-shrink: 0;
            border-top: 1px solid var(--color-border);
            background: var(--color-bg-raised);
            padding: 4px 6px;
            padding-bottom: max(4px, env(safe-area-inset-bottom, 0px));
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .term-keys-row {
            display: flex;
            gap: 4px;
            justify-content: center;
        }
        .term-key {
            min-width: 0;
            flex: 1 1 0;
            max-width: 60px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg-surface);
            color: var(--color-text);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: background 0.1s, border-color 0.1s;
            padding: 0 2px;
            overflow: hidden;
            white-space: nowrap;
        }
        .term-key:active {
            background: var(--color-border);
        }
        .term-key-active {
            background: var(--color-accent) !important;
            color: #000 !important;
            border-color: var(--color-accent) !important;
            font-weight: 600;
        }
    </style>

    <!-- Animations -->
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="bg-base text-txt">
    <div id="app"></div>

    <script type="module" src="js/app-vue.js"></script>
</body>
</html>
