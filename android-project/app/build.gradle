plugins {
    id 'com.android.application'
}

android {
    namespace 'com.claude.mobile'
    compileSdk 34

    defaultConfig {
        applicationId "com.claude.mobile"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        release {
            storeFile file("../android.keystore")
            storePassword "claude123"
            keyAlias "claude"
            keyPassword "claude123"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // No necesitamos Android Browser Helper
}
