<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/static/css/xterm.css" />
    <link rel="stylesheet" href="/static/app.css" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto%20Mono"
    />
    <script>
      // Interceptar WebSocket antes de que textual.js lo cree,
      // para poder enviar stdin directamente (scroll táctil).
      (function() {
        const _WS = window.WebSocket;
        window._textualSocket = null;
        window.WebSocket = function(...args) {
          const ws = new _WS(...args);
          window._textualSocket = ws;
          return ws;
        };
        window.WebSocket.prototype = _WS.prototype;
      })();
    </script>
    <script src="/static/js/textual.js"></script>
    <script>
      function getStartUrl() {
        const url = new URL(window.location.href);
        const params = new URLSearchParams(url.search);
        params.delete("delay");
        return url.pathname + "?" + params.toString();
      }
      async function refresh() {
        const ping_url = document.body.dataset.pingurl;
        if (ping_url) {
          await fetch(ping_url, {
            method: "GET",
            mode: "no-cors",
          });
        }
        window.location.href = getStartUrl();
      }
    </script>
  </head>
  <body data-pingurl="{{ ping_url }}">
    <div class="dialog-container intro-dialog">
      <div class="shade"></div>
      <div class="intro">
        <svg
          width="32px"
          viewBox="0 0 2933 2261"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M2927.81 0H1677.1L1312.35 205.173H306.689L0.359375 434.921L204.029 893.177H735.972L644.784 2261H1060.36L1441.72 1974.97L2073.92 688.003H2334.4L2717.9 472.286L2927.81 0ZM1245.82 410.347L1276.32 277.656H330.85L153.929 410.347H1245.82ZM1229.16 482.83H100.972L251.134 820.694H813.449L722.26 2188.52H837.043L1229.16 482.83ZM1350.7 277.656L911.417 2188.52H1023.87L1662.19 615.52H2301.36L2451.52 277.656H1350.7ZM1460.19 205.173H2497.79L2733.69 72.4829H1696.09L1460.19 205.173Z"
            fill="#ffffff"
          />
        </svg>

        <div>{{ application.name or 'Textual Application' }}</div>
        <button type="button" onClick="refresh()" id="start">Start</button>
      </div>
    </div>

    <div class="dialog-container closed-dialog">
      <div class="shade"></div>
      <div class="intro">
        <div class="message">Session ended.</div>
        <button type="button" onClick="refresh()">Restart</button>
      </div>
    </div>

    <div
      id="terminal"
      class="textual-terminal"
      data-session-websocket-url="{{ app_websocket_url }}"
      data-font-size="{{ font_size }}"
    ></div>

    <script>
      // Evitar que el teclado Android se abra al tocar el área del chat.
      // readOnly en el textarea previene el teclado aunque xterm llame focus().
      // Lo quitamos solo cuando el toque es en la zona del input.
      (function() {
        const terminal = document.getElementById('terminal');

        function applyReadOnly(textarea) {
          textarea.setAttribute('readonly', 'readonly');
        }

        // Observar cuando xterm crea el textarea y ponerlo readonly por defecto
        const observer = new MutationObserver(function() {
          const textarea = document.querySelector('.xterm-helper-textarea');
          if (textarea && !textarea.hasAttribute('data-managed')) {
            textarea.setAttribute('data-managed', '1');
            applyReadOnly(textarea);
          }
        });
        observer.observe(terminal, { childList: true, subtree: true });

        let touchStartY = 0;
        let touchStartX = 0;
        let touchStartTime = 0;
        let isSwiping = false;

        terminal.addEventListener('touchstart', function(e) {
          const textarea = document.querySelector('.xterm-helper-textarea');
          if (!textarea) return;
          const vv = window.visualViewport;
          const vh = vv ? vv.height : window.innerHeight;
          const touchY = e.touches[0].clientY;
          const isInputZone = touchY > (vh * 0.75);

          touchStartY = e.touches[0].clientY;
          touchStartX = e.touches[0].clientX;
          touchStartTime = Date.now();
          isSwiping = false;

          if (isInputZone) {
            textarea.removeAttribute('readonly');
            textarea.focus();
          } else {
            applyReadOnly(textarea);
          }
        }, { passive: true });

        terminal.addEventListener('touchend', function(e) {
          const vv = window.visualViewport;
          const vh = vv ? vv.height : window.innerHeight;
          const endY = e.changedTouches[0].clientY;
          const endX = e.changedTouches[0].clientX;
          const deltaY = touchStartY - endY;
          const deltaX = Math.abs(touchStartX - endX);
          const elapsed = Date.now() - touchStartTime;

          // Solo scroll si es gesto vertical, no en zona input, y desplazamiento mínimo
          const isInputZone = touchStartY > (vh * 0.75);
          if (isInputZone) return;
          if (Math.abs(deltaY) < 20) return;
          if (deltaX > Math.abs(deltaY)) return; // más horizontal que vertical

          const ws = window._textualSocket;
          if (!ws || ws.readyState !== 1) return;

          // Calcular cuántos steps enviar según distancia
          const steps = Math.min(Math.floor(Math.abs(deltaY) / 15), 20);
          // Swipe up (deltaY>0) = ver contenido más nuevo = scroll down (ArrowDown)
          // Swipe down (deltaY<0) = ver contenido más antiguo = scroll up (ArrowUp)
          const seq = deltaY > 0 ? '\x1b[B' : '\x1b[A';
          for (let i = 0; i < steps; i++) {
            ws.send(JSON.stringify(['stdin', seq]));
          }
        }, { passive: true });
      })();
    </script>

    <script>
      (function() {
        let lastVh = 0, lastTop = 0;
        function updateAppHeight() {
          const vv = window.visualViewport;
          const vh = Math.round(vv ? vv.height : window.innerHeight);
          const offsetTop = Math.round(vv ? vv.offsetTop : 0);
          if (vh === lastVh && offsetTop === lastTop) return;
          lastVh = vh;
          lastTop = offsetTop;
          document.documentElement.style.setProperty('--app-height', vh + 'px');
          document.body.style.top = offsetTop + 'px';
        }
        updateAppHeight();
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', updateAppHeight);
          window.visualViewport.addEventListener('scroll', updateAppHeight);
        }
        window.addEventListener('resize', updateAppHeight);
        window.addEventListener('focusout', updateAppHeight);
      })();
    </script>

  </body>
</html>
