<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/static/css/xterm.css" />
    <link rel="stylesheet" href="/static/app.css" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto%20Mono"
    />
    <script>
      // Interceptar WebSocket antes de que textual.js lo cree,
      // para poder enviar stdin directamente (scroll táctil).
      (function() {
        const _WS = window.WebSocket;
        window._textualSocket = null;
        window.WebSocket = function(...args) {
          const ws = new _WS(...args);
          window._textualSocket = ws;
          return ws;
        };
        window.WebSocket.prototype = _WS.prototype;
      })();
    </script>
    <script src="/static/js/textual.js"></script>
    <script>
      function getStartUrl() {
        const url = new URL(window.location.href);
        const params = new URLSearchParams(url.search);
        params.delete("delay");
        return url.pathname + "?" + params.toString();
      }
      async function refresh() {
        const ping_url = document.body.dataset.pingurl;
        if (ping_url) {
          await fetch(ping_url, {
            method: "GET",
            mode: "no-cors",
          });
        }
        window.location.href = getStartUrl();
      }
    </script>
  </head>
  <body data-pingurl="{{ ping_url }}">
    <div class="dialog-container intro-dialog">
      <div class="shade"></div>
      <div class="intro">
        <svg
          width="32px"
          viewBox="0 0 2933 2261"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M2927.81 0H1677.1L1312.35 205.173H306.689L0.359375 434.921L204.029 893.177H735.972L644.784 2261H1060.36L1441.72 1974.97L2073.92 688.003H2334.4L2717.9 472.286L2927.81 0ZM1245.82 410.347L1276.32 277.656H330.85L153.929 410.347H1245.82ZM1229.16 482.83H100.972L251.134 820.694H813.449L722.26 2188.52H837.043L1229.16 482.83ZM1350.7 277.656L911.417 2188.52H1023.87L1662.19 615.52H2301.36L2451.52 277.656H1350.7ZM1460.19 205.173H2497.79L2733.69 72.4829H1696.09L1460.19 205.173Z"
            fill="#ffffff"
          />
        </svg>

        <div>{{ application.name or 'Textual Application' }}</div>
        <button type="button" onClick="refresh()" id="start">Start</button>
      </div>
    </div>

    <div class="dialog-container closed-dialog">
      <div class="shade"></div>
      <div class="intro">
        <div class="message">Session ended.</div>
        <button type="button" onClick="refresh()">Restart</button>
      </div>
    </div>

    <div
      id="terminal"
      class="textual-terminal"
      data-session-websocket-url="{{ app_websocket_url }}"
      data-font-size="{{ font_size }}"
    ></div>

    <script>
      // ========================================================================
      // FIX PARA TECLADO ANDROID - GESTIÓN DE TOUCH INPUT
      // ========================================================================
      //
      // El problema: xterm.js usa un textarea oculto (.xterm-helper-textarea)
      // para capturar input. En Android, cuando el textarea tiene readonly,
      // el teclado NO aparece. Pero si quitamos readonly siempre, el teclado
      // aparece al tocar cualquier parte de la pantalla (molesto).
      //
      // La solución: Detectar si el toque está en la "zona de input" (fila
      // donde está el Input de Textual). Solo ahí:
      //   1. Quitar readonly
      //   2. Agregar clase "input-active" (hace el textarea visible)
      //   3. Hacer focus() para que Android muestre el teclado
      //
      // Fuera de esa zona: mantener readonly y sin clase input-active.
      // ========================================================================

      (function() {
        const terminal = document.getElementById('terminal');

        // Poner el textarea en modo "sin teclado" (readonly)
        function applyReadOnly(textarea) {
          textarea.setAttribute('readonly', 'readonly');
        }

        // Observar cuando xterm crea el textarea (ocurre al cargar)
        const observer = new MutationObserver(function() {
          const textarea = document.querySelector('.xterm-helper-textarea');
          if (textarea && !textarea.hasAttribute('data-managed')) {
            textarea.setAttribute('data-managed', '1');  // Marcar como ya inicializado
            textarea.style.fontSize = '14px';  // Reducido para mejor ajuste en pantalla
            applyReadOnly(textarea);  // Empezar sin teclado

            // Cuando el usuario cierra el teclado (blur), volver al estado inicial
            textarea.addEventListener('blur', function() {
              textarea.classList.remove('input-active');  // Ocultar textarea
              applyReadOnly(textarea);  // Prevenir que el teclado se abra solo

              // Actualizar viewport cuando el teclado se cierra
              if (window.updateAppHeight) {
                window.updateAppHeight();
              }
            });
          }
        });
        observer.observe(terminal, { childList: true, subtree: true });

        let touchStartY = 0;
        let touchStartX = 0;
        let lastTouchY = 0;
        let touchIsInChatZone = false;
        // Acumulador de píxeles para no enviar demasiados mensajes
        let scrollAccum = 0;
        const SCROLL_PX_PER_LINE = 55; // píxeles de dedo por línea de scroll

        // Al tocar la pantalla: ¿es zona de input o zona de scroll?
        terminal.addEventListener('touchstart', function(e) {
          const touchY = e.touches[0].clientY;
          touchStartY = touchY;
          touchStartX = e.touches[0].clientX;
          lastTouchY = touchY;
          scrollAccum = 0;

          const textarea = document.querySelector('.xterm-helper-textarea');
          if (!textarea) { touchIsInChatZone = true; return; }

          // -------------------------------------------------------------------
          // DETECCIÓN DE ZONA DE INPUT
          // -------------------------------------------------------------------
          // xterm.js mueve el textarea helper a la posición del cursor en
          // pantalla (donde está parpadeando el cursor de Textual).
          // Usamos getBoundingClientRect() para saber exactamente dónde está.
          // -------------------------------------------------------------------
          const rect = textarea.getBoundingClientRect();
          const rowHeight = rect.height || 20;
          const isInputZone = Math.abs(touchY - rect.top) < rowHeight * 2;

          touchIsInChatZone = !isInputZone;  // ¿Estamos fuera de la zona de input?

          if (isInputZone) {
            // -------------------------------------------------------------------
            // TOCÓ EN ZONA DE INPUT → ACTIVAR TECLADO
            // -------------------------------------------------------------------
            textarea.removeAttribute('readonly');        // Permitir input
            textarea.classList.add('input-active');      // Hacer visible (ver app.css)
            textarea.focus();                             // Activar teclado de Android

            // Actualizar viewport con un pequeño delay para que Android tenga
            // tiempo de mostrar el teclado y ajustar el visualViewport
            if (window.updateAppHeight) {
              setTimeout(window.updateAppHeight, 100);
              setTimeout(window.updateAppHeight, 300);  // Doble check por si el teclado es lento
            }
          } else {
            // -------------------------------------------------------------------
            // TOCÓ FUERA DE INPUT → PREVENIR TECLADO
            // -------------------------------------------------------------------
            textarea.classList.remove('input-active');   // Ocultar textarea
            applyReadOnly(textarea);                     // Bloquear input

            // Actualizar viewport inmediatamente
            if (window.updateAppHeight) {
              window.updateAppHeight();
            }
          }
        }, { passive: true });

        terminal.addEventListener('touchmove', function(e) {
          if (!touchIsInChatZone) return;
          const ws = window._textualSocket;
          if (!ws || ws.readyState !== 1) return;

          const currentY = e.touches[0].clientY;
          const deltaX = Math.abs(e.touches[0].clientX - touchStartX);
          const totalDeltaY = Math.abs(currentY - touchStartY);
          // Ignorar si el gesto es más horizontal que vertical
          if (deltaX > totalDeltaY) return;

          const moveDelta = lastTouchY - currentY; // positivo = dedo sube = scroll down
          lastTouchY = currentY;
          scrollAccum += moveDelta;

          while (Math.abs(scrollAccum) >= SCROLL_PX_PER_LINE) {
            const seq = scrollAccum > 0 ? '\x1b[B' : '\x1b[A';
            ws.send(JSON.stringify(['stdin', seq]));
            scrollAccum -= scrollAccum > 0 ? SCROLL_PX_PER_LINE : -SCROLL_PX_PER_LINE;
          }
        }, { passive: true });
      })();
    </script>

    <script>
      // ========================================================================
      // FIX PARA TECLADO ANDROID - AJUSTE DE VIEWPORT
      // ========================================================================
      //
      // Cuando el teclado se abre/cierra en Android, el visualViewport cambia.
      // Este script actualiza --app-height y body.top para que el chat se
      // ajuste al espacio disponible.
      //
      // La función updateAppHeight se hace global para que otros scripts
      // puedan forzar una actualización (ej: cuando se activa el teclado).
      // ========================================================================

      (function() {
        let lastVh = 0, lastTop = 0;

        // Hacer la función global para que otros scripts puedan usarla
        window.updateAppHeight = function() {
          const vv = window.visualViewport;
          const vh = Math.round(vv ? vv.height : window.innerHeight);
          const offsetTop = Math.round(vv ? vv.offsetTop : 0);
          if (vh === lastVh && offsetTop === lastTop) return;
          lastVh = vh;
          lastTop = offsetTop;
          document.documentElement.style.setProperty('--app-height', vh + 'px');
          document.body.style.top = offsetTop + 'px';
        };

        updateAppHeight();

        // Listener para cambios en el viewport (teclado abierto/cerrado)
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', window.updateAppHeight);
          window.visualViewport.addEventListener('scroll', window.updateAppHeight);
        }
        window.addEventListener('resize', window.updateAppHeight);
        window.addEventListener('focusout', window.updateAppHeight);
        window.addEventListener('focusin', window.updateAppHeight);
      })();
    </script>

    <script>
      // Font size proporcional al viewport: ~vw/24, entre 10px y 20px
      (function() {
        const size = Math.max(10, Math.min(20, Math.floor(window.innerWidth / 24)));
        document.getElementById('terminal').dataset.fontSize = size;
      })();
    </script>

  </body>
</html>
