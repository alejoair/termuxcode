<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>termux-code</title>

    <!-- Framework7 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7@8/framework7-bundle.min.css">

    <!-- Estilos custom separados por componente -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/tabs.css">
    <link rel="stylesheet" href="css/messages.css">
    <link rel="stylesheet" href="css/toolbar.css">
    <link rel="stylesheet" href="css/markdown.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/question.css">

    <!-- Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="app">
        <div class="view view-main safe-areas">
            <div class="page">

                <!-- Navbar: titulo + status -->
                <div class="navbar">
                    <div class="navbar-bg"></div>
                    <div class="navbar-inner">
                        <div class="title terminal-title"><span class="terminal-prompt">&gt;</span> TERMUX-CODE<span class="terminal-cursor">_</span></div>
                        <div class="right">
                            <div class="status">
                                <div class="status-dot" id="globalStatusDot"></div>
                                <span id="globalStatusText">Conectando...</span>
                            </div>
                        </div>
                    </div>
                    <!-- Subnavbar: pestañas -->
                    <div class="subnavbar">
                        <div class="subnavbar-inner">
                            <div class="tabs-header" id="tabsHeader"></div>
                            <button class="btn-new-tab" onclick="createNewTab()" title="Nueva pestaña">+</button>
                        </div>
                    </div>
                </div>

                <!-- Messages: area de chat con scroll -->
                <div class="page-content messages-area" id="messages">
                    <!-- Mensajes se insertan aqui -->
                </div>

                <!-- Toolbar bottom: botones de accion -->
                <div class="toolbar toolbar-bottom action-toolbar">
                    <div class="toolbar-inner">
                        <div class="action-pill">
                            <button class="btn-action" onclick="sendStop()" title="Detener">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <rect x="6" y="6" width="12" height="12" rx="2"/>
                                </svg>
                                <span>Stop</span>
                            </button>
                            <button class="btn-action" onclick="clearChat()" title="Limpiar">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                                </svg>
                                <span>Limpiar</span>
                            </button>
                            <button class="btn-action" onclick="sendDisconnect()" title="Reconectar">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M23 4v6h-6M1 20v-6h6"/>
                                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                                </svg>
                                <span>Reconectar</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Messagebar: input + enviar -->
                <div class="toolbar toolbar-bottom messagebar">
                    <div class="toolbar-inner">
                        <div class="messagebar-area">
                            <input type="text" id="prompt" placeholder="Escribe tu mensaje..." autofocus>
                        </div>
                        <button class="btn-send" onclick="send()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Template para pestañas -->
    <template id="tabTemplate">
        <div class="tab">
            <span class="tab-status-dot"></span>
            <span class="tab-name"></span>
            <span class="tab-close">×</span>
        </div>
    </template>

    <!-- Framework7 JS -->
    <script src="https://cdn.jsdelivr.net/npm/framework7@8/framework7-bundle.min.js"></script>

    <script type="module" src="app.js"></script>
</body>
</html>
