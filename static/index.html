<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Claude Code Mobile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100dvh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            padding-top: calc(10px + env(safe-area-inset-top));
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 1rem;
            color: #fff;
            font-weight: 600;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4757;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #2ed573;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Tabs */
        .tabs-container {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs-container::-webkit-scrollbar {
            display: none;
        }

        .tabs-header {
            display: flex;
            gap: 4px;
            flex: 1;
            overflow-x: auto;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            min-width: 0;
        }

        .tab:hover {
            background: rgba(255,255,255,0.1);
        }

        .tab.active {
            background: rgba(102,126,234,0.3);
        }

        .tab-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ff4757;
            flex-shrink: 0;
        }

        .tab-status-dot.connected {
            background: #2ed573;
        }

        .tab-status-dot.connecting {
            background: #ffc107;
            animation: pulse 1s infinite;
        }

        .tab-name {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tab-close {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            flex-shrink: 0;
        }

        .tab-close:hover {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8);
        }

        .btn-new-tab {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(102,126,234,0.3);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .btn-new-tab:hover {
            background: rgba(102,126,234,0.5);
        }

        /* Messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 20px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        .message {
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.4;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .bubble {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        .message.system .bubble {
            background: rgba(255,193,7,0.15);
            color: #ffc107;
            font-size: 0.75rem;
            text-align: center;
            max-width: 100%;
            margin: 8px auto;
        }

        .message.tool .bubble {
            background: rgba(233,69,96,0.15);
            color: #e94560;
            font-family: monospace;
            font-size: 0.75rem;
        }

        .message.thinking .bubble {
            background: transparent;
            color: rgba(255,255,255,0.5);
            font-style: italic;
            font-size: 0.85rem;
            padding: 4px 0;
        }

        .message-label {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 2px;
            padding-left: 4px;
        }

        .message.user .message-label {
            text-align: right;
            padding-right: 4px;
        }

        /* Input */
        .input-area {
            background: rgba(255,255,255,0.05);
            padding: 10px 15px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 8px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 10px 14px;
            height: 42px;
            border: none;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }

        .input-wrapper input:focus {
            box-shadow: 0 0 0 2px rgba(102,126,234,0.5);
        }

        .btn {
            padding: 10px 16px;
            height: 42px;
            border: none;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .btn-send {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            padding: 10px 12px;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 6px;
            justify-content: center;
            padding: 8px 15px;
            background: rgba(0,0,0,0.2);
        }

        /* Markdown */
        .markdown-content {
            line-height: 1.5;
        }

        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            margin-top: 0.8em;
            margin-bottom: 0.4em;
            font-weight: 600;
        }

        .markdown-content h1 { font-size: 1.4em; }
        .markdown-content h2 { font-size: 1.2em; }

        .markdown-content p { margin-bottom: 0.6em; }
        .markdown-content ul, .markdown-content ol {
            margin-bottom: 0.6em;
            padding-left: 1.3em;
        }

        .markdown-content code {
            background: rgba(0,0,0,0.3);
            padding: 2px 5px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85em;
        }

        .markdown-content pre {
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .markdown-content pre code {
            background: transparent;
            padding: 0;
        }

        .markdown-content blockquote {
            border-left: 3px solid rgba(255,255,255,0.3);
            padding-left: 10px;
            margin: 8px 0;
            color: rgba(255,255,255,0.7);
            font-style: italic;
        }

        .markdown-content a {
            color: #a78bfa;
        }

        .message.user .markdown-content {
            white-space: pre-wrap;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .bubble { max-width: 90%; }
            .btn span { display: none; }
        }

        /* Android navbar hack - padding extra en la parte inferior */
        @supports (padding: max(0px)) {
            .input-area {
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top">
            <h1>Claude Code Mobile</h1>
            <div class="status">
                <div class="status-dot" id="globalStatusDot"></div>
                <span id="globalStatusText">Conectando...</span>
            </div>
        </div>
        <div class="tabs-container">
            <div class="tabs-header" id="tabsHeader"></div>
            <button class="btn-new-tab" onclick="createNewTab()" title="Nueva pestaña">+</button>
        </div>
    </header>

    <div class="messages-container" id="messages"></div>

    <div class="toolbar">
        <button class="btn btn-secondary" onclick="sendStop()" title="Detener">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <rect x="6" y="6" width="12" height="12" rx="2"/>
            </svg>
            <span>Stop</span>
        </button>
        <button class="btn btn-secondary" onclick="clearChat()" title="Limpiar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
            </svg>
            <span>Limpiar</span>
        </button>
        <button class="btn btn-secondary" onclick="sendDisconnect()" title="Reconectar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 4v6h-6M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
            </svg>
            <span>Reconectar</span>
        </button>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="prompt" placeholder="Escribe tu mensaje..." autofocus>
            <button class="btn btn-send" onclick="send()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
                <span>Enviar</span>
            </button>
        </div>
    </div>

    <!-- Template para pestañas -->
    <template id="tabTemplate">
        <div class="tab">
            <span class="tab-status-dot"></span>
            <span class="tab-name"></span>
            <span class="tab-close">×</span>
        </div>
    </template>

    <script type="module" src="app.js"></script>
</body>
</html>
