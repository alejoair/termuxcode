<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TERMUXCODE</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: '#0a0f14',
                        raised: '#131a22',
                        surface: '#1a2332',
                        border: '#243040',
                        'border-focus': '#0d9488',
                        txt: '#e2e8f0',
                        muted: '#64748b',
                        accent: '#14b8a6',
                        ok: '#22d3ee',
                        err: '#f43f5e',
                        warn: '#f59e0b',
                    }
                }
            }
        }
    </script>

    <!-- Markdown parser (version pinned) -->
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>

    <!-- HTML sanitizer -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

    <style>
        :root {
            --color-bg-base: #0a0f14;
            --color-bg-raised: #131a22;
            --color-bg-surface: #1a2332;
            --color-border: #243040;
            --color-border-focus: #0d9488;
            --color-text: #e2e8f0;
            --color-text-muted: #64748b;
            --color-accent: #14b8a6;
            --color-ok: #22d3ee;
            --color-err: #f43f5e;
        }

        /* Message Styles */
        .message {
            animation: fadeIn 0.3s ease-in;
            margin-bottom: 1rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.no-anim {
            animation: none;
        }

        .message-label {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            margin-bottom: 0.25rem;
        }

        .bubble {
            background-color: var(--color-bg-raised);
            border-radius: 0.5rem;
            padding: 0.75rem;
        }

        .message.user .bubble {
            background-color: var(--color-bg-surface);
            border-right: 3px solid var(--color-border-focus);
        }

        .message.assistant .bubble {
            background-color: var(--color-bg-raised);
            border-left: 3px solid var(--color-accent);
        }

        .message.system .bubble {
            background-color: transparent;
            color: var(--color-text-muted);
            text-align: center;
            font-style: italic;
        }

        .message.tool-call,
        .message.thinking-msg {
            margin-top: 0.5rem;
        }

        .message.tool-call .bubble,
        .message.thinking-msg .bubble {
            background-color: transparent;
            padding: 0;
        }

        .markdown-content {
            line-height: 1.6;
        }

        .markdown-content p {
            margin-bottom: 0.5rem;
        }

        .markdown-content pre {
            background-color: var(--color-bg-base);
            border-radius: 0.25rem;
            padding: 0.75rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }

        .markdown-content code {
            background-color: var(--color-bg-surface);
            padding: 0.125rem 0.25rem;
            border-radius: 0.125rem;
            font-size: 0.875em;
        }

        .text-content {
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Tool blocks */
        .tool-group {
            margin-bottom: 0.25rem;
        }

        .tool-block,
        .tool-result-block,
        .thinking-block {
            background-color: var(--color-bg-raised);
            border: 1px solid var(--color-border);
            border-radius: 0.25rem;
            overflow: hidden;
        }

        .tool-group .tool-result-block {
            margin-top: 0.25rem;
            border-left: 2px solid var(--color-border);
        }

        .tool-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.15s;
        }

        .tool-header:hover {
            background-color: var(--color-bg-surface);
        }

        .tool-chevron {
            transition: transform 0.15s;
        }

        .accordion-item.open .tool-chevron {
            transform: rotate(90deg);
        }

        .tool-name {
            font-weight: 500;
        }

        .thinking-label {
            color: var(--color-accent);
        }

        .tool-result-label {
            color: var(--color-text-muted);
        }

        .accordion-item-content {
            display: none;
            padding: 0 0.75rem 0.75rem;
        }

        .accordion-item.open .accordion-item-content {
            display: block;
        }

        .tool-content,
        .thinking-content {
            background-color: var(--color-bg-base);
            padding: 0.75rem;
            border-radius: 0.25rem;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
        }

        /* Typing Indicator Animation */
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        .typing-dot {
            animation: bounce 1s infinite;
        }

        /* Diff View */
        .diff-view {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            border-radius: 0.25rem;
            overflow-x: auto;
        }

        .diff-line {
            display: flex;
            align-items: stretch;
            min-height: 1.5em;
        }

        .diff-line-num {
            width: 3rem;
            padding: 0 0.5rem;
            text-align: right;
            color: var(--color-text-muted);
            user-select: none;
            flex-shrink: 0;
            opacity: 0.6;
        }

        .diff-line-sign {
            width: 1.5rem;
            text-align: center;
            user-select: none;
            flex-shrink: 0;
            font-weight: bold;
        }

        .diff-line-content {
            flex: 1;
            padding: 0 0.5rem;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .diff-line.remove {
            background-color: rgba(244, 63, 94, 0.15);
        }
        .diff-line.remove .diff-line-sign {
            color: var(--color-err);
        }

        .diff-line.add {
            background-color: rgba(34, 211, 238, 0.1);
        }
        .diff-line.add .diff-line-sign {
            color: var(--color-ok);
        }

        .diff-line.context .diff-line-sign {
            color: var(--color-text-muted);
            opacity: 0.5;
        }

        /* Sidebar transition */
        .sidebar-enter-active,
        .sidebar-leave-active {
            transition: margin-left 0.25s ease, opacity 0.2s ease;
        }
        .sidebar-enter-from,
        .sidebar-leave-to {
            margin-left: -24rem;
            opacity: 0;
        }
    </style>
</head>
<body class="bg-base text-txt">
    <div id="app"></div>

    <script type="module" src="js/app-vue.js"></script>
</body>
</html>
